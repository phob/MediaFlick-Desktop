name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: build/cargo-target

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cef_path: ${{ github.workspace }}/.cache/cef
          - os: windows-latest
            cef_path: ${{ github.workspace }}\.cache\cef

    env:
      CEF_PATH: ${{ matrix.cef_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo and CEF downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .cache/cef
          key: ci-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-${{ matrix.os }}-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            file \
            libasound2-dev \
            libgtk-3-dev \
            libnss3-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxtst-dev \
            ninja-build

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: choco install ninja --yes --no-progress

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Build
        run: cargo build --bin mediaflick-desktop

  ci:
    name: CI
    if: ${{ always() }}
    needs: [fmt, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ needs.fmt.result }}" != "success" ] || [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
